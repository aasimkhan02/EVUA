<!-- bench-05-mixed-realistic: dashboard template -->
<!-- This template uses <app-productcard> with [product] input and (saved) output -->
<!-- ComponentInteractionRule reads this to detect the parent→child relationship -->

<div class="dashboard">
  <h2>Dashboard</h2>

  <!-- Child component usage — triggers ComponentInteractionRule -->
  <div *ngFor="let product of products">
    <app-productcard
      [product]="product"
      (saved)="onProductSaved($event)">
    </app-productcard>
  </div>
</div>
