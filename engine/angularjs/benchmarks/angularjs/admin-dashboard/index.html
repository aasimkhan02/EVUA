<!DOCTYPE html>
<html ng-app="adminApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminPulse — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Sidebar -->
  <div class="layout">
    <nav class="sidebar" ng-controller="NavController">
      <div class="sidebar-brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">AdminPulse</span>
      </div>
      <ul class="nav-links">
        <li ng-class="{active: isActive('/dashboard')}">
          <a href="#/dashboard"><span class="nav-icon">▣</span> Dashboard</a>
        </li>
        <li ng-class="{active: isActive('/users')}">
          <a href="#/users"><span class="nav-icon">◎</span> Users</a>
        </li>
        <li ng-class="{active: isActive('/activity')}">
          <a href="#/activity"><span class="nav-icon">◈</span> Activity</a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div class="admin-chip">
          <span class="avatar">AD</span>
          <span class="admin-label">Admin</span>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      <div ng-view></div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

  <script src="js/app.js"></script>
  <script src="js/services/UserService.js"></script>
  <script src="js/services/StatsService.js"></script>
  <script src="js/filters/filters.js"></script>
  <script src="js/controllers/NavController.js"></script>
  <script src="js/controllers/DashboardController.js"></script>
  <script src="js/controllers/UserController.js"></script>
  <script src="js/controllers/ActivityController.js"></script>
</body>
</html>
